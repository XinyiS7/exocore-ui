<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Alessandro - Vector Feather</title><style>    body {        margin: 0;        overflow: hidden;        background: radial-gradient(circle at center, #1a1a24 0%, #0d0d14 100%);        height: 100vh;        cursor: crosshair;    }    #feather {        position: absolute;        width: 60px;        height: 150px;        /* 精密绘制的SVG羽毛，带有极简的金属/数字光泽 */        background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="rgba(200,210,230,0.8)" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s-7-5.5-7-14C5 4 12 2 12 2s7 2 7 6c0 8.5-7 14-7 14z"/><path d="M12 2v20"/><path d="M12 6c-2 1-3 2-3 4"/><path d="M12 10c-3 1-4 3-4 5"/><path d="M12 14c-1.5 1-2 2-2 3"/><path d="M12 7c2-1 3-2 3-4"/><path d="M12 11c3-1 4-3 4-5"/><path d="M12 15c1.5-1 2-2 2-3"/></svg>') no-repeat center center;        background-size: contain;        transform-origin: 50% 80%;        will-change: transform;        transition: filter 0.3s ease;        user-select: none;    }    #feather:hover {        filter: drop-shadow(0 0 20px rgba(180, 200, 255, 0.6));        cursor: grab;    }    #feather:active {        cursor: grabbing;        filter: drop-shadow(0 0 10px rgba(180, 200, 255, 0.9));    }    #status {        position: absolute;        bottom: 20px;        left: 20px;        color: rgba(255,255,255,0.2);        font-family: monospace;        pointer-events: none;    }</style></head><body>    <div id="feather"></div>    <div id="status">Alessandro.Engine_ Active //</div><script>const feather = document.getElementById('feather');    // 物理状态    let pos = { x: window.innerWidth / 2, y: window.innerHeight / 4 };    let vel = { x: 0, y: 0 };    let angle = 0;    let angleVel = 0;    // 常量    const gravity = 0.08;    const friction = 0.96;    const airResistance = 0.92;    // 交互状态    let isDragging = false;    let lastMouse = { x: 0, y: 0 };    let dragDistance = 0;    function update() {        if (!isDragging) {            vel.y += gravity;            vel.x *= friction;            vel.y *= friction;            // 下落时的自然摇摆            angleVel += vel.x * 0.05;            angleVel -= Math.sin(angle * Math.PI / 180) * 0.5;            angleVel *= airResistance;            angle += angleVel;            pos.x += vel.x;            pos.y += vel.y;            // 触底与触边回弹            if (pos.y > window.innerHeight - 150) {                pos.y = window.innerHeight - 150;                vel.y *= -0.3;                vel.x *= 0.5;            }            if (pos.x < 0) { pos.x = 0; vel.x *= -0.5; }            if (pos.x > window.innerWidth - 60) { pos.x = window.innerWidth - 60; vel.x *= -0.5; }        }        feather.style.transform = `translate(${pos.x}px, ${pos.y}px) rotate(${angle}deg)`;        requestAnimationFrame(update);    }    // 核心改动：点击羽毛本体向上吹飞    feather.addEventListener('mousedown', (e) => {        isDragging = true;        dragDistance = 0; // 记录拖拽距离来区分是点击还是拖动        lastMouse = { x: e.clientX, y: e.clientY };    });    window.addEventListener('mousemove', (e) => {        if (!isDragging) return;        const dx = e.clientX - lastMouse.x;        const dy = e.clientY - lastMouse.y;        dragDistance += Math.sqrt(dx*dx + dy*dy); // 累加移动距离        pos.x += dx;        pos.y += dy;        vel.x = dx * 0.8;        vel.y = dy * 0.8;        angle = dx * 1.5;        lastMouse = { x: e.clientX, y: e.clientY };    });    window.addEventListener('mouseup', () => {        if (isDragging) {            isDragging = false;            // 如果鼠标没怎么移动就松开了，判定为“单击击飞”            if (dragDistance < 5) {                vel.y = -18; // 强力向上的气流                vel.x = (Math.random() - 0.5) * 15; // 随机左右漂移                angleVel = (Math.random() - 0.5) * 30; // 随机大风车旋转            }        }    });    // 窗口自适应    window.addEventListener('resize', () => {        if (pos.y > window.innerHeight) pos.y = window.innerHeight - 150;        if (pos.x > window.innerWidth) pos.x = window.innerWidth - 60;    });    update();</script></body></html>
