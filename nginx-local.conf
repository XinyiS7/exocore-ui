# 本地混合开发用 nginx 配置（HTTP + HTTPS）
# Django 跑在宿主机 :8000，nginx 在 Docker 容器里提供前端 + SSL 卸载
#
# HTTPS 重定向 → SSL 终端 → 反代 API 到宿主机 Django

server {
    listen 80;
    server_name my-server localhost 127.0.0.1 100.111.70.110 192.168.178.25;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name my-server localhost 127.0.0.1 100.111.70.110 192.168.178.25;

    ssl_certificate     /etc/nginx/ssl/my-server+4.pem;
    ssl_certificate_key /etc/nginx/ssl/my-server+4-key.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 反代 API 到宿主机 Django
    location /api/ {
        proxy_pass         http://host.docker.internal:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_buffering    off;
    }

    # 反代 media 文件
    location /media/ {
        proxy_pass         http://host.docker.internal:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}